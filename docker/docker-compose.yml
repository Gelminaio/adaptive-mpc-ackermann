services:
  dev:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: adaptive-mpc-ackermann:dev
    container_name: adaptive-mpc-dev
    network_mode: host
    ipc: host
    privileged: true
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - ROS_DOMAIN_ID=0
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
    volumes:
      - ../ros2_ws:/workspace/ros2_ws
      - ../config:/workspace/config
      - ../simulation:/workspace/simulation
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ~/.Xauthority:/home/dev/.Xauthority:rw
    stdin_open: true
    tty: true
    command: bash