name: Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  firmware-build:
    name: ESP32 Firmware (PlatformIO)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            firmware/.pio
          key: ${{ runner.os }}-pio-${{ hashFiles('firmware/platformio.ini') }}

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Build firmware
        working-directory: firmware
        run: pio run -e ci

  ros2-build:
    name: ROS 2 Packages (colcon)
    runs-on: ubuntu-latest
    container:
      image: osrf/ros:jazzy-desktop
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y python3-colcon-common-extensions python3-rosdep

      - name: Resolve ROS dependencies with rosdep
        shell: bash
        working-directory: ros2_ws
        run: |
          source /opt/ros/jazzy/setup.bash
          rosdep update
          rosdep install --from-paths src --ignore-src -r -y
      - name: Build workspace
        shell: bash
        working-directory: ros2_ws
        run: |
          source /opt/ros/jazzy/setup.bash
          colcon build --event-handlers console_direct+